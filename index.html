<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEED ME: The Student Food Oracle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@300;700&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --electric-blue: #00ffff;
            --acid-green: #ccff00;
            --deep-black: #000000;
            --bright-white: #ffffff;
            --blood-orange: #ff4500;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--deep-black);
            color: var(--bright-white);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Multi-layer collage background using food textures */
            background-image: 
                linear-gradient(45deg, rgba(255, 0, 255, 0.4), rgba(0, 255, 255, 0.4)),
                url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        #app-container {
            width: 90%;
            max-width: 600px;
            background: var(--bright-white);
            border: 10px solid var(--deep-black);
            box-shadow: 20px 20px 0px var(--neon-pink), -20px -20px 0px var(--electric-blue);
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        header {
            background: var(--acid-green);
            color: var(--deep-black);
            padding: 20px;
            margin: -60px -60px 40px -60px;
            transform: rotate(-2deg);
            border: 5px solid var(--deep-black);
        }

        h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            line-height: 0.9;
            text-align: center;
        }

        .step-container {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .step-container.active {
            display: flex;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.8) rotate(-5deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .question {
            color: var(--deep-black);
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: 8px solid var(--neon-pink);
            display: inline-block;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        button {
            background: var(--deep-black);
            color: var(--bright-white);
            border: none;
            padding: 20px;
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            border: 4px solid var(--deep-black);
            position: relative;
        }

        button:hover {
            transform: translate(-5px, -5px);
            box-shadow: 5px 5px 0px var(--acid-green);
            background: var(--blood-orange);
        }

        button:active {
            transform: translate(0, 0);
            box-shadow: none;
        }

        #result-display {
            text-align: center;
            background: var(--deep-black);
            color: var(--acid-green);
            padding: 40px;
            border: 5px dashed var(--electric-blue);
        }

        .result-label {
            font-size: 1.2rem;
            color: var(--neon-pink);
            margin-bottom: 10px;
        }

        .result-value {
            font-family: 'Archivo Black', sans-serif;
            font-size: 4rem;
            line-height: 1;
            text-shadow: 4px 4px 0px var(--bright-white);
        }

        .restart-btn {
            margin-top: 30px;
            background: var(--electric-blue);
            color: var(--deep-black);
            width: 100%;
        }

        /* Abstract overlapping elements */
        .decoration {
            position: fixed;
            z-index: -1;
            font-family: 'Archivo Black', sans-serif;
            font-size: 10vw;
            opacity: 0.1;
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .question { font-size: 1.8rem; }
            #app-container { padding: 20px; width: 95%; margin: 10px; }
            .result-value { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="decoration" style="top: 5%; left: -5%; color: var(--neon-pink); transform: rotate(15deg);">PIZZA RAMEN</div>
    <div class="decoration" style="bottom: 10%; right: -5%; color: var(--electric-blue); transform: rotate(-10deg);">COFFEE HUNGRY</div>

    <div id="app-container">
        <header>
            <h1>Student Oracle v1.0</h1>
        </header>

        <!-- Step 1: Hungry? -->
        <div class="step-container active" id="step-hungry">
            <h2 class="question">Hungry?</h2>
            <div class="btn-group">
                <button onclick="handleInput('hungry', true)">YES!</button>
                <button onclick="handleInput('hungry', false)">NAH</button>
            </div>
        </div>

        <!-- Step 2: Mood? -->
        <div class="step-container" id="step-mood">
            <h2 class="question">Mood Check?</h2>
            <div class="btn-group">
                <button onclick="handleInput('mood', true)">GOOD :)</button>
                <button onclick="handleInput('mood', false)">BAD :(</button>
            </div>
        </div>

        <!-- Step 3: Budget? -->
        <div class="step-container" id="step-budget">
            <h2 class="question">Got Cash?</h2>
            <div class="btn-group">
                <button onclick="handleInput('budget', true)">LOADED</button>
                <button onclick="handleInput('budget', false)">BROKE</button>
            </div>
        </div>

        <!-- Result -->
        <div class="step-container" id="step-result">
            <div id="result-display">
                <p class="result-label">THE ORACLE SAYS:</p>
                <h2 id="final-outcome" class="result-value">---</h2>
            </div>
            <button class="restart-btn" onclick="restart()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        // State Management
        let state = {
            hungry: null,
            mood: null,
            budget: null
        };

        function handleInput(key, value) {
            state[key] = value;
            determineNextStep(key);
        }

        function determineNextStep(lastInput) {
            const { hungry, mood, budget } = state;

            // Decision Tree logic
            if (lastInput === 'hungry') {
                showStep('mood');
            } 
            else if (lastInput === 'mood') {
                // If hungry and mood is bad -> A3 (No budget check needed)
                if (hungry === true && mood === false) {
                    showResult("DESSERT");
                } 
                // If not hungry and mood is bad -> A4 (No budget check needed)
                else if (hungry === false && mood === false) {
                    showResult("SKIP MEAL");
                } 
                // Otherwise need budget check
                else {
                    showStep('budget');
                }
            } 
            else if (lastInput === 'budget') {
                calculateFinalResult();
            }
        }

        function calculateFinalResult() {
            const { hungry, mood, budget } = state;

            if (hungry === true) {
                if (mood === true) {
                    if (budget === true) showResult("FAST FOOD"); // (M & B & H)
                    else showResult("HOME FOOD");                 // (M & !B & H)
                }
            } else {
                if (mood === true) {
                    if (budget === true) showResult("DESSERT");    // (M & B & !H)
                    else showResult("SKIP MEAL");                 // (M & !B & !H)
                }
            }
        }

        function showStep(stepId) {
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${stepId}`).classList.add('active');
        }

        function showResult(text) {
            document.getElementById('final-outcome').innerText = text;
            showStep('result');
        }

        function restart() {
            state = { hungry: null, mood: null, budget: null };
            showStep('hungry');
        }
    </script>
</body>
</html>
